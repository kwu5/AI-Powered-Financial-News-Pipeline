services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEWS_API_KEY=${NEWS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/news.db}
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-./data/chroma}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - MAX_ARTICLES_PER_DAY=${MAX_ARTICLES_PER_DAY:-30}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.85}
      - DAILY_RUN_HOUR=${DAILY_RUN_HOUR:-18}
      - OUTPUT_DIR=${OUTPUT_DIR:-./output}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped
